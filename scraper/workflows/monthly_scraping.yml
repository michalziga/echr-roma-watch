name: Monthly HUDOC Scrape

on:
  schedule:
    - cron: "0 6 1 * *"   # 1st of every month at 06:00 UTC
  workflow_dispatch:        # manual trigger from GitHub Actions tab

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # needed to commit new articles back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Step 1 — Collect new cases
        run: python scraper/step1_collect.py

      - name: Step 2 — Fetch full text
        run: python scraper/step2_fulltext.py

      - name: Step 3 — AI summarization
        run: python scraper/step3_summarize.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit new articles to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add articles/ last_run.json
          git diff --cached --quiet || git commit -m "chore: add new ECHR articles [$(date +'%Y-%m-%d')]"
          git push